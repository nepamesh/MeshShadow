{% extends "base.html" %}
{% block title %}Live Map{% endblock %}
{% block body_class %}map-page{% endblock %}

{% block head %}
<style>
    .map-frame {
        width: 100%;
        height: calc(100dvh - 220px);
        min-height: 360px;
        border: none;
        border-radius: 8px;
    }
    @media (min-width: 769px) {
        .map-frame {
            height: calc(100dvh - 200px);
        }
    }
    .map-controls {
        margin-bottom: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
    }
    .map-controls select, .map-controls button {
        padding: 6px 12px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--bg-secondary);
        color: var(--text-primary);
        cursor: pointer;
    }
    .map-controls button:hover {
        background: var(--bg-card-hover);
        border-color: var(--accent);
    }
    .auto-refresh-label {
        font-size: 0.9em;
        color: var(--text-muted);
    }
</style>
{% endblock %}

{% block content %}
<h1>Live Propagation Map</h1>
<div class="map-controls">
    <label>Time range:</label>
    <select id="hours-select" onchange="refreshMap()">
        <option value="1">Last 1 hour</option>
        <option value="6">Last 6 hours</option>
        <option value="24" selected>Last 24 hours</option>
        <option value="48">Last 48 hours</option>
        <option value="168">Last 7 days</option>
    </select>
    <button onclick="refreshMap()">Refresh</button>
    <span class="auto-refresh-label">Auto-refreshes every 60s</span>
</div>
<iframe id="map-frame" class="map-frame" src="/map/data?hours=24"></iframe>

<script>
function refreshMap() {
    const hours = document.getElementById('hours-select').value;
    document.getElementById('map-frame').src = '/map/data?hours=' + hours + '&_t=' + Date.now();
}
setInterval(refreshMap, 60000);
</script>
{% endblock %}
