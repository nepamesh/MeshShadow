services:
  meshpropagation:
    build: .
    container_name: meshpropagation
    restart: unless-stopped
    ports:
      - "${WEB_BIND_ADDR:-0.0.0.0}:${WEB_PORT:-5000}:5000"
    volumes:
      - meshprop-data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/meshprop.db
      - CACHE_DIR=/app/data/map_cache
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

volumes:
  meshprop-data:
